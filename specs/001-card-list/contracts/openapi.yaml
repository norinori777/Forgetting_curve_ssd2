openapi: 3.0.3
info:
  title: Card List API (specs/001-card-list)
  version: '0.1.0'
paths:
  /api/tags:
    get:
      summary: Search selectable tag options for the filter modal
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search text for narrowing tag candidates
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FilterOption'
  /api/collections:
    get:
      summary: Search selectable collection options for the filter modal
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search text for narrowing collection candidates
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FilterOption'
  /api/cards:
    get:
      summary: List cards with cursor pagination and filters
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: Cursor token (opaque, from previous response)
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: q
          schema:
            type: string
          description: Full-text search query (title/content)
        - in: query
          name: tagIds
          schema:
            type: string
          description: Comma-separated tag ids
        - in: query
          name: collectionIds
          schema:
            type: string
          description: Comma-separated collection ids
        - in: query
          name: filter
          schema:
            type: string
          description: pre-defined filters (e.g., today, overdue, unlearned)
        - in: query
          name: sort
          schema:
            type: string
            enum: [next_review_at, proficiency, created_at]
          description: sort key
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
                  nextCursor:
                    type: string
                    description: opaque cursor to fetch next page
  /api/cards/bulk:
    post:
      summary: Bulk operations on cards (archive, delete, addTags, removeTags)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [archive, delete, addTags, removeTags]
                cardIds:
                  type: array
                  items:
                    type: string
                tagIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: OK
  /api/review/start:
    post:
      summary: Start a review session based on current filter or explicit card ids
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  $ref: '#/components/schemas/CardListFilter'
                cardIds:
                  type: array
                  items:
                    type: string
                  description: optional explicit list of cards; if omitted, `filter` is applied
      responses:
        '200':
          description: OK
components:
  schemas:
    Card:
      type: object
      required:
        - id
        - title
        - content
        - tags
        - proficiency
        - nextReviewAt
        - lastCorrectRate
        - isArchived
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        collectionId:
          type: string
          nullable: true
        proficiency:
          type: number
        nextReviewAt:
          type: string
          format: date-time
        lastCorrectRate:
          type: number
        isArchived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FilterOption:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: string
        label:
          type: string
        matchedBy:
          type: string
          nullable: true
          enum: [name, alias, null]
    CardListFilter:
      type: object
      properties:
        q:
          type: string
        filter:
          type: string
          enum: [today, overdue, unlearned]
        sort:
          type: string
          enum: [next_review_at, proficiency, created_at]
        tagIds:
          type: array
          items:
            type: string
        collectionIds:
          type: array
          items:
            type: string
