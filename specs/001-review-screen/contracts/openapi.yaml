openapi: 3.0.3
info:
  title: Review Screen Session Contract
  version: '0.1.0'
paths:
  /api/review/start:
    post:
      summary: Create a review session from the current card list filter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartReviewRequest'
      responses:
        '200':
          description: Review session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartReviewResponse'
        '400':
          description: Invalid request body
        '404':
          description: No cards matched the requested filter
        '503':
          description: Temporary backend failure before a session snapshot could be created; the client should offer retry or return to the list
  /api/review/sessions/{sessionId}:
    get:
      summary: Retrieve the latest snapshot for an existing review session
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Current review session snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewSessionSnapshot'
        '404':
          description: Session not found
        '503':
          description: Temporary backend failure while loading the latest snapshot; the client may show the last cached snapshot and offer retry
  /api/review/sessions/{sessionId}/assessment:
    put:
      summary: Save or replace the assessment for the current card
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssessmentRequest'
      responses:
        '200':
          description: Updated snapshot after assessment save
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewSessionSnapshot'
        '404':
          description: Session not found
        '409':
          description: Card is not editable in the current session state
        '503':
          description: Temporary backend failure while saving the assessment; the client may keep the pending assessment locally and retry
  /api/review/sessions/{sessionId}/navigation:
    post:
      summary: Move to the previous or next card in the review session
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NavigateReviewRequest'
      responses:
        '200':
          description: Updated snapshot after navigation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewSessionSnapshot'
        '404':
          description: Session not found
        '409':
          description: Next navigation requires an assessment on the current card
        '503':
          description: Temporary backend failure while navigating; the client may continue showing the last cached snapshot and offer retry
components:
  schemas:
    CardListFilter:
      type: object
      properties:
        q:
          type: string
        filter:
          type: string
          enum: [today, overdue, unlearned]
        sort:
          type: string
          enum: [next_review_at, proficiency, created_at]
        tagIds:
          type: array
          items:
            type: string
        collectionIds:
          type: array
          items:
            type: string
    StartReviewRequest:
      type: object
      properties:
        filter:
          $ref: '#/components/schemas/CardListFilter'
        cardIds:
          type: array
          items:
            type: string
      anyOf:
        - required: [filter]
        - required: [cardIds]
    StartReviewResponse:
      type: object
      required:
        - snapshot
      properties:
        snapshot:
          $ref: '#/components/schemas/ReviewSessionSnapshot'
    ReviewSessionSnapshot:
      type: object
      required:
        - sessionId
        - status
        - currentIndex
        - totalCount
        - remainingCount
        - canGoPrev
        - canGoNext
        - filterSummary
        - summary
      properties:
        sessionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [in_progress, completed]
        currentIndex:
          type: integer
          minimum: 0
        totalCount:
          type: integer
          minimum: 0
        remainingCount:
          type: integer
          minimum: 0
        canGoPrev:
          type: boolean
        canGoNext:
          type: boolean
        filterSummary:
          $ref: '#/components/schemas/ReviewFilterSummary'
        currentCard:
          allOf:
            - $ref: '#/components/schemas/ReviewCardSnapshot'
          nullable: true
        summary:
          $ref: '#/components/schemas/ReviewSessionSummary'
    ReviewCardSnapshot:
      type: object
      required:
        - cardId
        - title
        - content
        - tags
        - reviewReason
        - locked
      properties:
        cardId:
          type: string
        title:
          type: string
        content:
          type: string
        answer:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        collectionLabel:
          type: string
          nullable: true
        nextReviewAt:
          type: string
          format: date-time
        reviewReason:
          $ref: '#/components/schemas/ReviewReason'
        currentAssessment:
          $ref: '#/components/schemas/ReviewAssessment'
        locked:
          type: boolean
    ReviewReason:
      type: object
      required:
        - label
      properties:
        label:
          type: string
          description: Short explanation of why the current card is included in this review session
        detail:
          type: string
          nullable: true
          description: Optional supporting detail such as due time or matching filter condition
        source:
          type: string
          enum: [next_review_at, overdue, filter_match, unlearned, manual_selection]
          nullable: true
    ReviewFilterSummary:
      type: object
      required:
        - sort
        - tagLabels
        - collectionLabels
      properties:
        q:
          type: string
          nullable: true
        filter:
          type: string
          nullable: true
          enum: [today, overdue, unlearned, null]
        sort:
          type: string
          enum: [next_review_at, proficiency, created_at]
        tagLabels:
          type: array
          items:
            type: string
        collectionLabels:
          type: array
          items:
            type: string
    ReviewSessionSummary:
      type: object
      required:
        - forgotCount
        - uncertainCount
        - rememberedCount
        - perfectCount
        - assessedCount
        - totalCount
      properties:
        forgotCount:
          type: integer
          minimum: 0
        uncertainCount:
          type: integer
          minimum: 0
        rememberedCount:
          type: integer
          minimum: 0
        perfectCount:
          type: integer
          minimum: 0
        assessedCount:
          type: integer
          minimum: 0
        totalCount:
          type: integer
          minimum: 0
    ReviewAssessment:
      type: string
      nullable: true
      enum: [forgot, uncertain, remembered, perfect, null]
    UpdateAssessmentRequest:
      type: object
      required:
        - cardId
        - assessment
      properties:
        cardId:
          type: string
        assessment:
          type: string
          enum: [forgot, uncertain, remembered, perfect]
    NavigateReviewRequest:
      type: object
      required:
        - direction
      properties:
        direction:
          type: string
          enum: [prev, next]