openapi: 3.0.3
info:
  title: Study Card CSV Import API Contract
  version: '0.1.0'
paths:
  /api/cards/import/validate:
    post:
      summary: Validate parsed CSV rows before bulk card import
      description: |
        Accepts normalized rows parsed in the browser from an uploaded CSV file.
        The server validates required fields and owner-scoped collection name matches,
        and returns row-level issues for preview before the final import action.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateCardImportRequest'
      responses:
        '200':
          description: Validation result returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateCardImportResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardImportError'
        '500':
          description: Failed to validate rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardImportError'
  /api/cards/import:
    post:
      summary: Import validated CSV rows as new study cards
      description: |
        Creates new study cards from the provided rows. Unknown tag names are created automatically.
        If any row fails during persistence, the full import is rolled back and no card is created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportCardsRequest'
      responses:
        '200':
          description: Import succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportCardsResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardImportError'
        '409':
          description: Validation failed and import was rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardImportError'
        '500':
          description: Import failed and was rolled back
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardImportError'
components:
  schemas:
    CardImportRowInput:
      type: object
      required:
        - rowNumber
        - title
        - content
        - answer
        - tagNames
      properties:
        rowNumber:
          type: integer
          minimum: 1
          description: Original row number in the uploaded CSV, after optional header handling
        title:
          type: string
          description: Card title extracted from column 1
        content:
          type: string
          description: Card content extracted from column 2, with literal \n already converted to real line breaks
        answer:
          type: string
          nullable: true
          description: Optional answer extracted from column 3, null when omitted
        tagNames:
          type: array
          description: Tag names normalized from column 4 using semicolon separators
          items:
            type: string
        collectionName:
          type: string
          nullable: true
          description: Collection name from column 5, null when omitted
    ValidateCardImportRequest:
      type: object
      required:
        - rows
      properties:
        rows:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CardImportRowInput'
    CardImportIssue:
      type: object
      required:
        - scope
        - code
        - messageKey
        - messageText
      properties:
        scope:
          type: string
          enum: [file, row]
        rowNumber:
          type: integer
          nullable: true
        code:
          type: string
          enum:
            - unsupported_encoding
            - row_length_mismatch
            - missing_optional_columns
            - title_required
            - content_required
            - collection_not_found
            - invalid_header
            - validation_failed
        messageKey:
          type: string
        messageText:
          type: string
        detail:
          type: string
          nullable: true
    CardImportRowResult:
      allOf:
        - $ref: '#/components/schemas/CardImportRowInput'
        - type: object
          required:
            - status
            - issues
          properties:
            status:
              type: string
              enum: [valid, invalid]
            resolvedCollectionId:
              type: string
              format: uuid
              nullable: true
            issues:
              type: array
              items:
                $ref: '#/components/schemas/CardImportIssue'
    CardImportSummary:
      type: object
      required:
        - totalRows
        - headerSkipped
        - validRows
        - invalidRows
        - canImport
      properties:
        totalRows:
          type: integer
        headerSkipped:
          type: boolean
        validRows:
          type: integer
        invalidRows:
          type: integer
        canImport:
          type: boolean
        importedRows:
          type: integer
          nullable: true
    ValidateCardImportResponse:
      type: object
      required:
        - ok
        - summary
        - rows
        - issues
      properties:
        ok:
          type: boolean
          enum: [true]
        summary:
          $ref: '#/components/schemas/CardImportSummary'
        rows:
          type: array
          items:
            $ref: '#/components/schemas/CardImportRowResult'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/CardImportIssue'
    ImportCardsRequest:
      type: object
      required:
        - rows
      properties:
        rows:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CardImportRowInput'
    ImportCardsResponse:
      type: object
      required:
        - ok
        - importedCount
        - messageKey
      properties:
        ok:
          type: boolean
          enum: [true]
        importedCount:
          type: integer
          minimum: 1
        messageKey:
          type: string
          description: Flash message key used after redirecting back to the card list
    CardImportError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          enum: [invalid_body, validation_failed, database_error]
        message:
          type: string
          nullable: true
        details:
          type: object
          nullable: true