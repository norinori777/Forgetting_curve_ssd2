openapi: 3.0.3
info:
  title: Card List API Contract
  version: '0.2.0'
paths:
  /api/tags:
    get:
      summary: Search selectable tag options for the shared filter modal
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search text for narrowing tag candidates
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FilterOption'
  /api/collections:
    get:
      summary: Search selectable collection options for the shared filter modal
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search text for narrowing collection candidates
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FilterOption'
  /api/cards:
    get:
      summary: List non-archived cards with cursor pagination and filter state
      parameters:
        - in: query
          name: cursor
          schema:
            type: string
          description: Cursor token (opaque, from previous response)
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: q
          schema:
            type: string
          description: Full-text search query for title/content/tag related matches
        - in: query
          name: tagIds
          schema:
            type: string
          description: Comma-separated tag ids
        - in: query
          name: collectionIds
          schema:
            type: string
          description: Comma-separated collection ids
        - in: query
          name: filter
          schema:
            type: string
            enum: [today, overdue, unlearned]
          description: Single-select status filter chosen from the dropdown
        - in: query
          name: sort
          schema:
            type: string
            enum: [next_review_at, proficiency, created_at]
          description: Sort key for stable ordered pagination
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Card'
                  nextCursor:
                    type: string
                    description: opaque cursor to fetch next page
        '400':
          description: Invalid query or cursor/sort mismatch
  /api/cards/bulk:
    post:
      summary: Execute a bulk action on selected cards
      description: |
        `archive` removes affected cards from the default list after a successful refresh.
        `addTags` and `removeTags` are idempotent: adding an already attached tag or removing a missing tag is treated as a successful no-op.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [archive, delete, addTags, removeTags]
                cardIds:
                  type: array
                  items:
                    type: string
                tagIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: OK
        '400':
          description: Invalid request payload
  /api/review/start:
    post:
      summary: Start a review session from the current list filter or an explicit card list
      description: In the card list UI, the caller sends `filter` and ignores selection state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  $ref: '#/components/schemas/CardListFilter'
                cardIds:
                  type: array
                  items:
                    type: string
                  description: optional explicit list of cards; if omitted, `filter` is applied
      responses:
        '200':
          description: OK
        '400':
          description: Invalid request payload
components:
  schemas:
    Card:
      type: object
      required:
        - id
        - title
        - content
        - tags
        - proficiency
        - nextReviewAt
        - lastCorrectRate
        - isArchived
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        collectionId:
          type: string
          nullable: true
        proficiency:
          type: number
        nextReviewAt:
          type: string
          format: date-time
        lastCorrectRate:
          type: number
        isArchived:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FilterOption:
      type: object
      required:
        - id
        - label
      properties:
        id:
          type: string
        label:
          type: string
        matchedBy:
          type: string
          nullable: true
          enum: [name, alias, null]
    CardListFilter:
      type: object
      properties:
        q:
          type: string
        filter:
          type: string
          enum: [today, overdue, unlearned]
        sort:
          type: string
          enum: [next_review_at, proficiency, created_at]
        tagIds:
          type: array
          items:
            type: string
        collectionIds:
          type: array
          items:
            type: string
